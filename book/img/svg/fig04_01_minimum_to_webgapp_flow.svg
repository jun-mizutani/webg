<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="最小描画から WebgApp への流れ">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="4.1" markerHeight="4.1" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  
    <text x="56" y="58" text-anchor="start" font-size="22" font-weight="700" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="56" dy="0">第4章</tspan></text>
    <text x="56" y="98" text-anchor="start" font-size="38" font-weight="700" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="56" dy="0">最小描画から WebgApp への流れ</tspan></text>
    <line x1="56" y1="122" x2="1224" y2="122" stroke="#d8e3f4" stroke-width="2"/>
  
  
    
    <rect x="60" y="170" width="520" height="470" rx="28" ry="28" fill="#eef4ff" stroke="#9db4d7" stroke-width="2.2"/>
    <text x="84" y="208" text-anchor="start" font-size="24" font-weight="700" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="84" dy="0">ローレベルの最小構成</tspan></text>
  
    
    <rect x="700" y="170" width="520" height="470" rx="28" ry="28" fill="#eef4ff" stroke="#9db4d7" stroke-width="2.2"/>
    <text x="724" y="208" text-anchor="start" font-size="24" font-weight="700" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="724" dy="0">WebgApp の標準構成</tspan></text>
  

    <rect x="160" y="236" width="320" height="72" rx="20" ry="20" fill="#f7fbff" stroke="#2f537f" stroke-width="2.5"/><text x="320" y="272" text-anchor="middle" font-size="26" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="320" dy="0">1. Screen を作って await ready</tspan></text>
    <rect x="160" y="338" width="320" height="72" rx="20" ry="20" fill="#f7fbff" stroke="#2f537f" stroke-width="2.5"/><text x="320" y="374" text-anchor="middle" font-size="26" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="320" dy="0">2. Shader / projection を初期化</tspan></text>
    <rect x="160" y="440" width="320" height="72" rx="20" ry="20" fill="#f7fbff" stroke="#2f537f" stroke-width="2.5"/><text x="320" y="476" text-anchor="middle" font-size="26" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="320" dy="0">3. Space / eye / Shape を作る</tspan></text>
    <rect x="160" y="542" width="320" height="72" rx="20" ry="20" fill="#f7fbff" stroke="#2f537f" stroke-width="2.5"/><text x="320" y="578" text-anchor="middle" font-size="26" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="320" dy="0">4. clear -&gt; draw -&gt; present を回す</tspan></text>

    <rect x="800" y="236" width="320" height="72" rx="20" ry="20" fill="#f7fbff" stroke="#2f537f" stroke-width="2.5"/><text x="960" y="272" text-anchor="middle" font-size="26" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="960" dy="0">1. new WebgApp(options)</tspan></text>
    <rect x="800" y="338" width="320" height="72" rx="20" ry="20" fill="#f7fbff" stroke="#2f537f" stroke-width="2.5"/><text x="960" y="374" text-anchor="middle" font-size="26" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="960" dy="0">2. await app.init()</tspan></text>
    <rect x="800" y="440" width="320" height="72" rx="20" ry="20" fill="#f7fbff" stroke="#2f537f" stroke-width="2.5"/><text x="960" y="476" text-anchor="middle" font-size="26" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="960" dy="0">3. shape / model / scene を追加</tspan></text>
    <rect x="800" y="542" width="320" height="72" rx="20" ry="20" fill="#f7fbff" stroke="#2f537f" stroke-width="2.5"/><text x="960" y="578" text-anchor="middle" font-size="26" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="960" dy="0">4. app.start() で入力 / HUD / 診断も回す</tspan></text>

    <line x1="320" y1="308" x2="320" y2="338" stroke="#4b5563" stroke-width="3"  marker-end="url(#arrow)"/>
    <line x1="320" y1="410" x2="320" y2="440" stroke="#4b5563" stroke-width="3"  marker-end="url(#arrow)"/>
    <line x1="320" y1="512" x2="320" y2="542" stroke="#4b5563" stroke-width="3"  marker-end="url(#arrow)"/>
    <line x1="960" y1="308" x2="960" y2="338" stroke="#4b5563" stroke-width="3"  marker-end="url(#arrow)"/>
    <line x1="960" y1="410" x2="960" y2="440" stroke="#4b5563" stroke-width="3"  marker-end="url(#arrow)"/>
    <line x1="960" y1="512" x2="960" y2="542" stroke="#4b5563" stroke-width="3"  marker-end="url(#arrow)"/>
    <line x1="480" y1="374" x2="800" y2="374" stroke="#4b5563" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrow)"/><text x="640" y="336" text-anchor="middle" font-size="20" font-weight="500" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="640" dy="0">描画の骨格を理解したあとで標準構成へ</tspan></text>

    <text x="320" y="676" text-anchor="middle" font-size="22" font-weight="500" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="320" dy="0">最初は何が最低限必要かを確認する</tspan></text>
    <text x="960" y="676" text-anchor="middle" font-size="22" font-weight="500" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="960" dy="0">慣れたら WebgApp で補助機能込みの構成へ進む</tspan></text>
  
</svg>