<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="座標系と回転の基準">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="4.1" markerHeight="4.1" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  
    <text x="56" y="98" text-anchor="start" font-size="33" font-weight="700" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="56" dy="0">座標系と回転の基準</tspan></text>
    <line x1="56" y1="118" x2="1224" y2="118" stroke="#d8e3f4" stroke-width="2"/>
  
  
    <rect x="116" y="232" width="282" height="190" rx="20" ry="20" fill="#eef5ff" stroke="#2f537f" stroke-width="2.5"/><text x="257" y="327" text-anchor="middle" font-size="28.910891089108908" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="257" dy="-2.0250000000000004em">右手系</tspan><tspan x="257" dy="1.35em">+X = 右</tspan><tspan x="257" dy="1.35em">+Y = 上</tspan><tspan x="257" dy="1.35em">+Z = 前</tspan></text>
    <rect x="488" y="214" width="296" height="226" rx="20" ry="20" fill="#f9fcff" stroke="#2f537f" stroke-width="2.5"/><text x="636" y="327" text-anchor="middle" font-size="23.674242424242422" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="636" dy="-2.0250000000000004em">回転の対応</tspan><tspan x="636" dy="1.35em">head = yaw = Y軸</tspan><tspan x="636" dy="1.35em">pitch = pitch = X軸</tspan><tspan x="636" dy="1.35em">bank = roll = Z軸</tspan></text>
    <rect x="896" y="232" width="248" height="190" rx="20" ry="20" fill="#fff8ef" stroke="#bc8752" stroke-width="2.5"/><text x="1020" y="327" text-anchor="middle" font-size="30" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="1020" dy="-1.35em">正の head</tspan><tspan x="1020" dy="1.35em">前 +Z が</tspan><tspan x="1020" dy="1.35em">右 +X へ回る</tspan></text>

    <line x1="178" y1="536" x2="332" y2="536" stroke="#4b5563" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="178" y1="536" x2="178" y2="404" stroke="#4a9c83" stroke-width="6" marker-end="url(#arrow)"/>
    <line x1="178" y1="536" x2="104" y2="602" stroke="#bc8752" stroke-width="6" marker-end="url(#arrow)"/>
    <text x="348" y="540" text-anchor="start" font-size="24" font-weight="500" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="348" dy="0">+X</tspan></text>
    <text x="178" y="386" text-anchor="middle" font-size="24" font-weight="500" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="178" dy="0">+Y</tspan></text>
    <text x="88" y="626" text-anchor="start" font-size="24" font-weight="500" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="88" dy="0">+Z</tspan></text>

    <circle cx="1018" cy="532" r="92" fill="none" stroke="#bc8752" stroke-width="4" stroke-dasharray="10 8"/>
    <line x1="1018" y1="532" x2="1018" y2="426" stroke="#4a9c83" stroke-width="6" marker-end="url(#arrow)"/>
    <line x1="1018" y1="532" x2="1110" y2="532" stroke="#4b5563" stroke-width="5" marker-end="url(#arrow)"/>
    <circle cx="1018" cy="440" r="8" fill="#bc8752"/>
    <path d="M 1018 440 A 92 92 0 0 1 1100 494" fill="none" stroke="#bc8752" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="1134" y="536" text-anchor="start" font-size="24" font-weight="500" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="1134" dy="0">+X</tspan></text>
    <text x="1018" y="406" text-anchor="middle" font-size="24" font-weight="500" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="1018" dy="0">+Y</tspan></text>
    <text x="980" y="428" text-anchor="end" font-size="24" font-weight="500" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="980" dy="0">+Z</tspan></text>
    <text x="1136" y="476" text-anchor="start" font-size="22" font-weight="500" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="1136" dy="0">head +90</tspan></text>

    <text x="640" y="626" text-anchor="middle" font-size="24" font-weight="500" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="640" dy="0">第3章では、軸の向きと回転軸の対応を最初に固定して読むと後続の章がつながりやすい</tspan></text>
  
</svg>