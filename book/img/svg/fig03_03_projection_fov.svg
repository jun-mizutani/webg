<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="視野角と見え方の違い">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="4.1" markerHeight="4.1" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  
    <text x="56" y="98" text-anchor="start" font-size="33" font-weight="700" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="56" dy="0">視野角と見え方の違い</tspan></text>
    <line x1="56" y1="118" x2="1224" y2="118" stroke="#d8e3f4" stroke-width="2"/>
  
  
    <rect x="122" y="236" width="280" height="264" rx="20" ry="20" fill="#f9fcff" stroke="#2f537f" stroke-width="2.5"/><text x="262" y="368" text-anchor="middle" font-size="30" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="262" dy="-2.0250000000000004em">狭い FOV</tspan><tspan x="262" dy="1.35em">35°</tspan><tspan x="262" dy="1.35em">望遠寄り</tspan><tspan x="262" dy="1.35em">写る範囲は狭い</tspan></text>
    <rect x="500" y="236" width="280" height="264" rx="20" ry="20" fill="#eef5ff" stroke="#2f537f" stroke-width="2.5"/><text x="640" y="368" text-anchor="middle" font-size="30" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="640" dy="-1.35em">標準 FOV</tspan><tspan x="640" dy="1.35em">55°</tspan><tspan x="640" dy="1.35em">基準の見え方</tspan></text>
    <rect x="878" y="236" width="280" height="264" rx="20" ry="20" fill="#fff8ef" stroke="#bc8752" stroke-width="2.5"/><text x="1018" y="368" text-anchor="middle" font-size="30" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="1018" dy="-2.0250000000000004em">広い FOV</tspan><tspan x="1018" dy="1.35em">85°</tspan><tspan x="1018" dy="1.35em">広角寄り</tspan><tspan x="1018" dy="1.35em">写る範囲は広い</tspan></text>

    <path d="M 180 560 L 262 410 L 344 560 Z" fill="none" stroke="#4b5563" stroke-width="4"/>
    <path d="M 520 560 L 640 382 L 760 560 Z" fill="none" stroke="#4a9c83" stroke-width="5"/>
    <path d="M 888 560 L 1018 342 L 1148 560 Z" fill="none" stroke="#bc8752" stroke-width="5"/>

    <text x="262" y="596" text-anchor="middle" font-size="22" font-weight="500" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="262" dy="0">同じ位置でも対象が大きく見える</tspan></text>
    <text x="640" y="596" text-anchor="middle" font-size="22" font-weight="500" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="640" dy="0">標準的な基準</tspan></text>
    <text x="1018" y="596" text-anchor="middle" font-size="22" font-weight="500" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="1018" dy="0">同じ位置でも対象が小さく見える</tspan></text>
  
