    <text x="640" y="718" text-anchor="middle" font-size="22" font-weight="500" fill="#374151" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="640" dy="0">第25章は、この 3 層のどこを読んでいるかを見失わないことが最も大切</tspan></text>
  
