    <rect x="736" y="580" width="220" height="72" rx="20" ry="20" fill="#f7fbff" stroke="#2f537f" stroke-width="2.5"/><text x="846" y="616" text-anchor="middle" font-size="26" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="846" dy="-0.675em">Quat</tspan><tspan x="846" dy="1.35em">回転保持 / 補間</tspan></text>

