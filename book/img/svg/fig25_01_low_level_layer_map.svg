    <rect x="530" y="210" width="220" height="72" rx="20" ry="20" fill="#f7fbff" stroke="#2f537f" stroke-width="2.5"/><text x="640" y="246" text-anchor="middle" font-size="26" font-weight="600" fill="#111827" font-family="'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif"><tspan x="640" dy="-0.675em">Shader</tspan><tspan x="640" dy="1.35em">pipeline / uniform / bind group</tspan></text>
