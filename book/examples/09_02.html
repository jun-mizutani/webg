<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <title>09_02 Phong のテクスチャ付きトーラス</title>
  <link rel="stylesheet" href="./example.css" />
</head>
<body>
  <div class="page">
    <h1>book/examples</h1>
    <h2>09_02 Phong のテクスチャ付きトーラス</h2>
    <div class="section-card">
      <p>`book/09_シェーダーの実装.md` の `Phong.js` を、そのまま 1 個の texture 付き torus で確認する実行例です</p>
      <p class="note">`num256.png` を貼った torus だけに絞り、`Phong` が texture / ambient / specular / fog を含む基本経路として動くことを見やすくしています</p>
    </div>

    <div class="canvas-block">
      <canvas id="canvas" width="960" height="720"></canvas>
    </div>

    <pre id="code"></pre>

    <script type="module" id="example-source">
import WebgApp from "../../webg/WebgApp.js";
import Primitive from "../../webg/Primitive.js";
import Shape from "../../webg/Shape.js";
import Phong from "./Phong.js";
import { loadTextureFlipX } from "../../unittest/_shared/SkinningTestUtils.js";

const LIGHT = [48.0, 72.0, 118.0, 1.0];

const app = new WebgApp({
  document,
  shaderClass: Phong,
  messageFontTexture: "../../webg/font512.png",
  clearColor: [0.08, 0.10, 0.14, 1.0],
  lightPosition: LIGHT,
  layoutMode: "embedded",
  fixedCanvasSize: {
    width: 720,
    height: 540,
    useDevicePixelRatio: false
  },
  camera: {
    target: [0.0, 0.0, 0.0],
    distance: 30.0,
    yaw: 24.0,
    pitch: -12.0
  }
});
await app.init();
app.shader.setLightPosition(LIGHT);

const orbit = app.createOrbitEyeRig({
    target: [0.0, 0.0, 0.0],
    distance: 30.0,
    yaw: 24.0,
    pitch: -12.0,
    minDistance: 14.0,
    maxDistance: 52.0
});

const { texture } = await loadTextureFlipX(app.getGL(), "../../webg/num256.png");

const torusShape = new Shape(app.getGL());
torusShape.applyPrimitiveAsset(Primitive.donut(8.2, 2.6, 36, 24, torusShape.getPrimitiveOptions()));
torusShape.endShape();
torusShape.setShader(app.shader);
torusShape.setMaterial("phong", {
  use_texture: 1,
  texture,
  color: [1.0, 1.0, 1.0, 1.0],
  ambient: 0.26,
  specular: 0.90,
  power: 42.0,
  emissive: 0.0,
  fog_color: [0.08, 0.10, 0.14, 1.0],
  fog_near: 26.0,
  fog_far: 70.0,
  fog_density: 0.03,
  fog_mode: 1.0
});
const torusNode = app.space.addNode(null, "phongTorus");
torusNode.rotateX(28.0);
torusNode.rotateY(18.0);
torusNode.addShape(torusShape);

const state = {
  paused: false
};

app.attachInput({
  onKeyDown: (key, ev) => {
    if (ev.repeat) return;
    if (key === "space") {
      state.paused = !state.paused;
    } else if (key === "r") {
      orbit.setAngles(24.0, -12.0);
      orbit.setDistance(30.0);
    }
  }
});

app.createHelpPanel({
  id: "example0902Help",
  lines: [
    "Drag: orbit camera  Wheel: zoom",
    "Space: pause rotation  R: reset camera",
    "Phong.js with a single textured torus"
  ]
});

app.start({
  onUpdate: ({ deltaSec }) => {
    orbit.update(deltaSec);
    if (!state.paused) {
      torusNode.rotateY(18.0 * deltaSec);
      torusNode.rotateX(8.0 * deltaSec);
    }

    app.message.setLines("status", [
      "shader: Phong.js",
      "texture: ../../webg/num256.png",
      "ambient=0.26 specular=0.90 power=42 fog=linear"
    ], {
      anchor: "top-left",
      x: 0,
      y: 0
    });
  }
});
    </script>
    <script>
      document.getElementById("code").textContent =
        document.getElementById("example-source").textContent.trim();
    </script>
  </div>
</body>
</html>
