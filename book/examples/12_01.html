  <title>12_01 Action と AnimationState の最小例</title>

<body>
  <div class="page">
    <h1>book/examples</h1>
    <h2>12_01 Action と AnimationState の最小例</h2>
    <div class="section-card">
      <p>`book/12_アニメーション.md` の `Action`、`AnimationState`、`getDebugInfo()` を、repo 内の `hand.glb` でそのまま試せる実行例です</p>
      <p class="note">`1`〜`5` で pose 切替、`6` で rest、`/` で次の state、`@` で現在 pose を再始動します。status 行には `state`、`action`、`transition` が並ぶので、12章の層の違いを追いやすくしてあります</p>
    </div>

    <div class="canvas-block">
      <canvas id="canvas" width="960" height="720"></canvas>
    </div>

    <pre id="code"></pre>

    <script type="module" id="example-source">
import WebgApp from "../../webg/WebgApp.js";
import SmoothShader from "../../webg/SmoothShader.js";
import Action from "../../webg/Action.js";
import AnimationState from "../../webg/AnimationState.js";

const GLTF_FILE = "../../samples/gltf_loader/hand.glb";

const FINGER_PATTERNS = [
  { id: "N1", fromKey: 2, toKey: 3, entryDurationMs: 250 },
  { id: "N2", fromKey: 4, toKey: 5, entryDurationMs: 250 },
  { id: "N3", fromKey: 6, toKey: 7, entryDurationMs: 250 },
  { id: "N4", fromKey: 8, toKey: 9, entryDurationMs: 250 },
  { id: "N5", fromKey: 10, toKey: 11, entryDurationMs: 250 },
  { id: "N0", fromKey: 12, toKey: 13, entryDurationMs: 250 }
];

const STATE_DEFS = [
  { id: "pose1", action: "N1" },
  { id: "pose2", action: "N2" },
  { id: "pose3", action: "N3" },
  { id: "pose4", action: "N4" },
  { id: "pose5", action: "N5" },
  { id: "pose0", action: "N0" }
];

const app = new WebgApp({
  document,
  shaderClass: SmoothShader,
  messageFontTexture: "../../webg/font512.png",
  clearColor: [0.15, 0.16, 0.25, 1.0],
  lightPosition: [0.0, 100.0, 1000.0, 1.0],
  layoutMode: "embedded",
  fixedCanvasSize: {
    width: 720,
    height: 540,
    useDevicePixelRatio: false
  },
  camera: {
    target: [0.0, 0.0, 0.0],
    distance: 12.0,
    head: 0.0,
    pitch: 10.0
  }
});
await app.init();

const model = await app.loadModel(GLTF_FILE, {
  format: "gltf",
  instantiate: true,
  startAnimations: false,
  gltf: {
    includeSkins: true
  }
});

const runtime = model.runtime;
const shapes = runtime.shapes;
const clipId = model.getClipNames()[0];
const animation = runtime.getAnimation(clipId);
const rootNodeInfo = runtime.nodes.find((item) => item.parent === null) ?? runtime.nodes[0] ?? null;
const modelRoot = rootNodeInfo ? (model.instantiated?.nodeMap?.get(rootNodeInfo.id) ?? null) : null;
if (!animation || !modelRoot) {
  throw new Error("Failed to prepare animation example");
}

const size = app.getShapeSize(shapes);
app.cameraRig.setPosition(size.centerx, size.centery, size.centerz);
app.eye.setPosition(0.0, 0.0, Math.max(1.0, size.max * 1.25));
app.eye.setAttitude(0.0, 10.0, 0.0);

const orbit = app.createOrbitEyeRig({
    target: [size.centerx, size.centery, size.centerz],
    distance: Math.max(1.0, size.max * 1.25),
    head: 0.0,
    pitch: 10.0,
    minDistance: Math.max(0.5, size.max * 0.6),
    maxDistance: Math.max(4.0, size.max * 3.0)
});

const action = new Action(animation);
for (let i = 0; i < FINGER_PATTERNS.length; i++) {
  const pattern = FINGER_PATTERNS[i];
  action.addPattern(pattern);
  action.addAction(pattern.id, [pattern.id]);
}
action.setVerbose(false);

const machine = new AnimationState(action, {
  initialState: "pose0"
});
for (let i = 0; i < STATE_DEFS.length; i++) {
  const state = STATE_DEFS[i];
  machine.addState({
    id: state.id,
    action: state.action
  });
}

const state = {
  desiredPoseId: "pose0",
  autoCycle: false,
  nextAutoCycleTimeMs: 0,
  lastEvent: "startup"
};

const getPoseIndex = (stateId) => {
  return Math.max(0, STATE_DEFS.findIndex((item) => item.id === stateId));
};

const getNextPoseId = () => {
  const currentIndex = getPoseIndex(state.desiredPoseId);
  return STATE_DEFS[(currentIndex + 1) % STATE_DEFS.length].id;
};

const setDesiredPose = (nextStateId) => {
  state.desiredPoseId = nextStateId;
  machine.setVariable("desiredPoseId", state.desiredPoseId);
  state.lastEvent = `desired=${nextStateId}`;
};

const replayCurrentState = () => {
  const currentStateId = machine.getCurrentState()?.id ?? state.desiredPoseId;
  machine.setState(currentStateId, {
    context: {
      desiredPoseId: state.desiredPoseId,
      nowMs: app.space.now()
    },
    force: true
  });
  state.lastEvent = `replay=${currentStateId}`;
};

machine.setState("pose0", {
  context: {
    desiredPoseId: state.desiredPoseId,
    nowMs: app.space.now()
  },
  force: true
});

app.attachInput({
  onKeyDown: (key, ev) => {
    if (ev.repeat) return;
    if (key === "1") setDesiredPose("pose1");
    else if (key === "2") setDesiredPose("pose2");
    else if (key === "3") setDesiredPose("pose3");
    else if (key === "4") setDesiredPose("pose4");
    else if (key === "5") setDesiredPose("pose5");
    else if (key === "6") setDesiredPose("pose0");
    else if (key === "/") setDesiredPose(getNextPoseId());
    else if (key === "@") replayCurrentState();
    else if (key === "p") {
      state.autoCycle = !state.autoCycle;
      state.nextAutoCycleTimeMs = 0;
      state.lastEvent = `autoCycle=${state.autoCycle ? "on" : "off"}`;
    } else if (key === "r") {
      orbit.setAngles(0.0, 10.0);
      orbit.setDistance(Math.max(1.0, size.max * 1.25));
      state.lastEvent = "camera reset";
    }
  }
});

app.createHelpPanel({
  id: "example1201Help",
  lines: [
    "Drag: orbit camera  Wheel: zoom",
    "1-5: pose1-pose5  6: pose0  /: next state  @: replay current",
    "P: auto cycle on/off  R: reset camera"
  ]
});

app.start({
  onUpdate: ({ deltaSec }) => {
    orbit.update(deltaSec);
    modelRoot.rotateY(12.0 * deltaSec);

    const nowMs = app.space.now();
    if (state.autoCycle) {
      if (state.nextAutoCycleTimeMs === 0) {
        state.nextAutoCycleTimeMs = nowMs + 1200;
      } else if (nowMs >= state.nextAutoCycleTimeMs) {
        setDesiredPose(getNextPoseId());
        state.nextAutoCycleTimeMs = nowMs + 1200;
      }
    }

    machine.update({
      desiredPoseId: state.desiredPoseId,
      nowMs
    });

    const actionInfo = action.getActionInfo();
    const patternInfo = action.getPatternInfo();
    const debugInfo = machine.getDebugInfo();
    const transitionInfo = machine.getCurrentTransition();

    app.setStatusLines([
      `desired=${state.desiredPoseId} current=${debugInfo.stateId ?? "-"}`,
      `action=${debugInfo.actionId ?? "-"} pattern=${patternInfo?.id ?? "-"} transition=${transitionInfo?.label ?? "-"}`,
      `playing=${debugInfo.playing ? "yes" : "no"} paused=${debugInfo.paused ? "yes" : "no"} auto=${state.autoCycle ? "on" : "off"} last=${state.lastEvent}`,
      `clip=${clipId} actionIndex=${actionInfo.patternIndex}`
    ], {
      anchor: "top-left",
      x: 0,
      y: 0
    });
  }
});
    </script>
    <script>
      document.getElementById("code").textContent =
        document.getElementById("example-source").textContent.trim();
    </script>
  </div>
</body>
</html>
