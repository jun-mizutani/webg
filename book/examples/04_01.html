<!doctype html>
<!-- book/examples/04_01.html 2026/04/12 -->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>04_01 ローレベルの最小例</title>
  <link rel="stylesheet" href="./example.css" />
</head>
<body>
  <div class="page">
    <h1>book/examples</h1>
    <h2>04_01 ローレベルの最小例</h2>
    <div class="section-card">
      <p>`book/04_WebGPUとwebgの最小描画.md` の「4.10 ローレベルの最小例」を、本文中へ埋め込みやすい固定 canvas へ調整した実行ページです</p>
      <p class="note">`Screen`、`Space`、`Shape`、`SmoothShader`、projection、描画ループの関係をそのまま追えるようにしてあります</p>
    </div>

    <div class="canvas-block">
      <canvas id="canvas" width="960" height="720"></canvas>
    </div>

    <pre id="code"></pre>

    <script type="module" id="example-source">
import Screen from "../../webg/Screen.js";
import Space from "../../webg/Space.js";
import Primitive from "../../webg/Primitive.js";
import Shape from "../../webg/Shape.js";
import Matrix from "../../webg/Matrix.js";
import SmoothShader from "../../webg/SmoothShader.js";

const CANVAS_W = 720;
const CANVAS_H = 540;

// 1) Screen と shader を初期化する
const screen = new Screen(document);
await screen.ready;
screen.setClearColor([0.1, 0.15, 0.1, 1.0]);

const shader = new SmoothShader(screen.getGL());
await shader.init();
Shape.prototype.shader = shader;

// 2) 埋め込み用の固定 canvas へ合わせて projection を作る
const projection = new Matrix();
const applyViewportLayout = () => {
  screen.resize(CANVAS_W, CANVAS_H);
  projection.makeProjectionMatrix(
    0.1,
    1000.0,
    screen.getRecommendedFov(55.0),
    screen.getAspect()
  );
  shader.setProjectionMatrix(projection);
};
applyViewportLayout();
window.addEventListener("resize", applyViewportLayout);
window.addEventListener("orientationchange", applyViewportLayout);

shader.setLightPosition([120.0, 180.0, 140.0, 1.0]);

// 3) Space、eye、Shape を順に作る
const space = new Space();
const eye = space.addNode(null, "eye");
eye.setPosition(0.0, 0.0, 28.0);

const shape = new Shape(screen.getGL());
shape.applyPrimitiveAsset(Primitive.cube(8.0, shape.getPrimitiveOptions()));
shape.endShape();
shape.setMaterial("smooth-shader", {
  has_bone: 0,
  use_texture: 0,
  color: [1.0, 0.5, 0.3, 1.0]
});

const node = space.addNode(null, "obj");
node.addShape(shape);

// 4) clear -> draw -> present の最小ループで表示する
const loop = () => {
  node.rotateY(0.8);
  node.rotateX(0.4);
  screen.clear();
  space.draw(eye);
  screen.present();
  requestAnimationFrame(loop);
};
loop();
    </script>
    <script>
      document.getElementById("code").textContent =
        document.getElementById("example-source").textContent.trim();
    </script>
  </div>
</body>
</html>
