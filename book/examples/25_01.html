<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>25_01 ローレベルAPIの最小例</title>
  <link rel="stylesheet" href="./example.css" />
</head>
<body>
  <div class="page">
    <h1>book/examples</h1>
    <h2>25_01 ローレベルAPIの最小例</h2>
    <div class="section-card">
      <p>`book/25_ローレベルAPIの基礎.md` の「25.10 全体をつないだ最小例」を、固定 canvas でそのまま試せるようにしたページです</p>
      <p class="note">`Screen`、`SmoothShader`、`Matrix`、`CoordinateSystem`、`Shape`、`Node`、`Space` がどうつながるかを、1 個の cube の回転で確認できます</p>
    </div>

    <div class="canvas-block">
      <canvas id="canvas" width="960" height="720"></canvas>
    </div>

    <pre id="code"></pre>

    <script type="module" id="example-source">
import Screen from "../../webg/Screen.js";
import Space from "../../webg/Space.js";
import Shape from "../../webg/Shape.js";
import Primitive from "../../webg/Primitive.js";
import Matrix from "../../webg/Matrix.js";
import Quat from "../../webg/Quat.js";
import CoordinateSystem from "../../webg/CoordinateSystem.js";
import SmoothShader from "../../webg/SmoothShader.js";

const CANVAS_W = 720;
const CANVAS_H = 540;

const screen = new Screen(document);
await screen.ready;
screen.setClearColor([0.1, 0.15, 0.1, 1.0]);
screen.fitToViewport = false;
screen.useDevicePixelRatio = false;

const shader = new SmoothShader(screen.getGL());
await shader.init();

const projection = new Matrix();
const updateProjection = () => {
  screen.resize(CANVAS_W, CANVAS_H);
  projection.makeProjectionMatrix(
    0.1,
    1000.0,
    screen.getRecommendedFov(55.0),
    screen.getAspect()
  );
  shader.setProjectionMatrix(projection);
};
updateProjection();
window.addEventListener("resize", updateProjection);
window.addEventListener("orientationchange", updateProjection);

shader.setLightPosition([120.0, 180.0, 140.0, 1.0]);

const space = new Space();
const eye = space.addNode(null, "eye");
eye.setPosition(0.0, 0.0, 12.0);
space.setEye(eye);

const pose = new CoordinateSystem(null, "cubePose");
pose.setPosition(0.0, 0.0, 0.0);
pose.setAttitude(20.0, 10.0, 0.0);

const spin = new Quat();
spin.setRotateY(1.0);

const shape = new Shape(screen.getGL());
shape.setShader(shader);
shape.applyPrimitiveAsset(Primitive.cube(3.0, shape.getPrimitiveOptions()));
shape.endShape();
shape.setMaterial("smooth-shader", {
  has_bone: 0,
  use_texture: 0,
  color: [1.0, 0.5, 0.3, 1.0]
});

const cube = space.addNode(null, "cube");
cube.setPosition(...pose.getPosition());
cube.setAttitude(...pose.getLocalAttitude());
cube.addShape(shape);

const loop = () => {
  cube.rotateY(0.8);
  cube.rotateX(0.3);
  screen.clear();
  space.draw(eye);
  screen.present();
  requestAnimationFrame(loop);
};
loop();
    </script>
    <script>
      document.getElementById("code").textContent =
        document.getElementById("example-source").textContent.trim();
    </script>
  </div>
</body>
</html>
