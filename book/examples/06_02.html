<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>06_02 follow camera</title>
  <link rel="stylesheet" href="./example.css" />
</head>
<body>
  <div class="page">
    <h1>book/examples</h1>
    <h2>06_02 follow camera</h2>
    <div class="section-card">
      <p>`book/06_カメラ制御とEyeRig.md` の follow camera 例を、そのまま本文へ埋め込んで追従の見え方を確認しやすくしたページです</p>
      <p class="note">オレンジ色の target が円運動し、`EyeRig` の follow mode が後方視点を保ちながら追いかけます。ドラッグで yaw / pitch を変え、ホイールで距離を変えられます</p>
    </div>

    <div class="canvas-block">
      <canvas id="canvas" width="960" height="720"></canvas>
    </div>

    <pre id="code"></pre>

    <script type="module" id="example-source">
import WebgApp from "../../webg/WebgApp.js";
import EyeRig from "../../webg/EyeRig.js";
import Shape from "../../webg/Shape.js";
import Primitive from "../../webg/Primitive.js";

const app = new WebgApp({
  document,
  messageFontTexture: "../../webg/font512.png",
  clearColor: [0.06, 0.08, 0.12, 1.0],
  layoutMode: "embedded",
  fixedCanvasSize: {
    width: 720,
    height: 540,
    useDevicePixelRatio: false
  },
  camera: {
    target: [0.0, 2.0, 0.0],
    distance: 14.0,
    yaw: 12.0,
    pitch: -12.0
  }
});
await app.init();

const makeShape = (buildAsset, material) => {
  const shape = new Shape(app.getGL());
  buildAsset(shape);
  shape.endShape();
  shape.setMaterial("smooth-shader", {
    has_bone: 0,
    ...material
  });
  return shape;
};

const floorShape = makeShape((shape) => {
  shape.applyPrimitiveAsset(Primitive.cuboid(26.0, 0.8, 26.0, shape.getPrimitiveOptions()));
}, {
  use_texture: 0,
  color: [0.16, 0.20, 0.26, 1.0],
  ambient: 0.24,
  specular: 0.22,
  power: 18.0
});
const floor = app.space.addNode(null, "floor");
floor.setPosition(0.0, -0.4, 0.0);
floor.addShape(floorShape);

const markerShape = makeShape((shape) => {
  shape.applyPrimitiveAsset(Primitive.cuboid(0.7, 0.5, 0.7, shape.getPrimitiveOptions()));
}, {
  use_texture: 0,
  color: [0.32, 0.72, 0.96, 1.0],
  ambient: 0.24,
  specular: 0.56,
  power: 26.0
});
for (let i = 0; i < 16; i++) {
  const angle = (Math.PI * 2.0 * i) / 16.0;
  const marker = app.space.addNode(null, `marker-${i}`);
  marker.setPosition(Math.cos(angle) * 8.0, 0.25, Math.sin(angle) * 8.0);
  marker.addShape(markerShape);
}

const targetRoot = app.space.addNode(null, "target-root");

const bodyShape = makeShape((shape) => {
  shape.applyPrimitiveAsset(Primitive.cuboid(2.0, 2.2, 3.0, shape.getPrimitiveOptions()));
}, {
  use_texture: 0,
  color: [0.90, 0.46, 0.18, 1.0],
  ambient: 0.26,
  specular: 0.78,
  power: 34.0
});
targetRoot.addShape(bodyShape);
targetRoot.setPosition(8.0, 1.1, 0.0);

const headShape = makeShape((shape) => {
  shape.applyPrimitiveAsset(Primitive.sphere(0.75, 18, 18, shape.getPrimitiveOptions()));
}, {
  use_texture: 0,
  color: [0.96, 0.82, 0.66, 1.0],
  ambient: 0.24,
  specular: 0.64,
  power: 28.0
});
const head = app.space.addNode(targetRoot, "target-head");
head.setPosition(0.0, 1.8, 0.0);
head.addShape(headShape);

const noseShape = makeShape((shape) => {
  shape.applyPrimitiveAsset(Primitive.cuboid(0.35, 0.35, 1.1, shape.getPrimitiveOptions()));
}, {
  use_texture: 0,
  color: [0.22, 0.18, 0.16, 1.0],
  ambient: 0.20,
  specular: 0.32,
  power: 16.0
});
const nose = app.space.addNode(head, "target-nose");
nose.setPosition(0.0, 0.0, 0.8);
nose.addShape(noseShape);

const followRig = new EyeRig(app.cameraRig, app.cameraRod, app.eye, {
  document,
  element: app.screen.canvas,
  input: app.input,
  type: "follow",
  follow: {
    targetNode: targetRoot,
    targetOffset: [0.0, 2.3, 0.0],
    distance: 14.0,
    yaw: 0.0,
    pitch: -12.0,
    minDistance: 7.0,
    maxDistance: 22.0,
    inheritTargetYaw: true,
    targetYawOffset: 180.0,
    followLerp: 6.0
  }
});
followRig.attachPointer();

app.createHelpPanel({
  id: "example0602Help",
  lines: [
    "Drag: rotate follow camera",
    "Wheel: zoom distance",
    "EyeRig mode: follow"
  ]
});

let elapsedSec = 0.0;

app.start({
  onUpdate: ({ deltaSec }) => {
    elapsedSec += deltaSec;
    const angle = elapsedSec * 0.65;
    const x = Math.cos(angle) * 8.0;
    const z = Math.sin(angle) * 8.0;
    const yaw = (-angle * 180.0 / Math.PI) + 90.0;

    targetRoot.setPosition(x, 1.1, z);
    targetRoot.setAttitude(yaw, 0.0, 0.0);
    head.rotateY(0.5);
    nose.rotateZ(1.0);

    followRig.update(deltaSec);

    app.setStatusLines([
      `target x=${x.toFixed(2)} z=${z.toFixed(2)}`,
      `follow distance=${followRig.getModeState().distance.toFixed(2)}`,
      "EyeRig follow sample"
    ], {
      anchor: "top-left",
      x: 0,
      y: 0
    });
  }
});
    </script>
    <script>
      document.getElementById("code").textContent =
        document.getElementById("example-source").textContent.trim();
    </script>
  </div>
</body>
</html>
