<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>webg camera follow unittest</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(50, 72, 108, 0.34), transparent 42%),
        linear-gradient(180deg, #090d14 0%, #121a25 100%);
      color: #e5eef7;
      font-family: "Courier New", monospace;
    }
    #canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .panel {
      position: fixed;
      z-index: 4;
      pointer-events: none;
      white-space: pre-wrap;
      line-height: 1.55;
      border-radius: 14px;
      border: 1px solid rgba(145, 178, 221, 0.26);
      background: rgba(14, 22, 14, 0.76);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(8px);
    }
    #status {
      left: 14px;
      top: 14px;
      width: min(430px, calc(100vw - 28px));
      padding: 14px 16px;
      font-size: 13px;
    }
    #manual {
      top: 14px;
      right: 14px;
      width: min(420px, calc(100vw - 28px));
      padding: 14px 16px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <pre id="status" class="panel">initializing...</pre>
  <pre id="manual" class="panel">loading visual sample...</pre>
  <script type="module" src="./main.js"></script>
</body>
</html>
