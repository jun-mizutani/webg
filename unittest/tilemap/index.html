<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>webg tilemap unittest</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(72, 110, 74, 0.32), transparent 42%),
        linear-gradient(180deg, #131d13 0%, #1a2a1d 100%);
      color: #e7eef8;
      font-family: "Courier New", monospace;
    }
    #canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #status {
      position: fixed;
      right: 14px;
      top: 14px;
      z-index: 4;
      pointer-events: none;
      white-space: pre-wrap;
      line-height: 1.5;
      border-radius: 14px;
      border: 1px solid rgba(142, 173, 219, 0.26);
      background: rgba(14, 22, 14, 0.74);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(8px);
      padding: 14px 16px;
      width: min(340px, calc(100vw - 28px));
      font-size: 13px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <pre id="status">initializing...</pre>
  <script type="module" src="./main.js"></script>
</body>
</html>
